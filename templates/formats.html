<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: transparent; }
  .card {
    width: 720px;
    background: #f5f7fb;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(80, 100, 180, 0.18);
  }
  .header {
    padding: 24px 30px 20px;
    background: linear-gradient(120deg, #38c6a0 0%, #3d9cf0 100%);
    color: #fff;
  }
  .header .title { font-size: 26px; font-weight: 700; }
  .header .sub {
    font-size: 15px;
    opacity: 0.92;
    margin-top: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 18px;
  }
  .item {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 3px 10px rgba(100, 120, 180, 0.08);
  }
  .badge {
    flex: 0 0 auto;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #38c6a0, #3d9cf0);
    color: #fff;
    font-size: 19px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
  }
  .info { flex: 1 1 auto; min-width: 0; }
  .name {
    font-size: 18px;
    font-weight: 700;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .desc {
    font-size: 13px;
    color: #8a929e;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .footer {
    text-align: center;
    color: #9aa2b0;
    font-size: 15px;
    padding: 14px 0 22px;
  }
  .footer b { color: #38c6a0; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">选择输出格式</div>
      <div class="sub">工程文件：{{ filename }}</div>
    </div>
    <div class="grid">
      {% for f in formats %}
      <div class="item">
        <div class="badge">{{ loop.index }}</div>
        <div class="info">
          <div class="name">{{ f.name }}</div>
          <div class="desc">{{ f.desc }}</div>
        </div>
      </div>
      {% endfor %}
    </div>
    <div class="footer">发送对应<b>序号</b>即可转换并获取文件</div>
  </div>
</body>
</html>
